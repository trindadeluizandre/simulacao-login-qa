<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Study - Login Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Área de Acesso</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="exemplo@email.com">
                <span id="emailError" class="error-message">E-mail inválido</span>
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres">
                <span id="passError" class="error-message">Senha curta demais</span>
            </div>

            <button type="submit" id="btnLogin">Entrar</button>
        </form>
        <p id="feedbackMessage"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
